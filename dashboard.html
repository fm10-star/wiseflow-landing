<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiseflow | Dashboard Comercial</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Specific page modifications extending styles.css */
        body {
            padding: 40px 0;
            background-image: radial-gradient(circle at 50% 10%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
        }

        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .dashboard-title-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .table-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--gradient-primary);
            border-radius: 4px;
        }

        /* Metrics row */
        .kpis-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--gradient-primary);
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-glow);
            box-shadow: 0 12px 24px -10px rgba(6, 182, 212, 0.15);
        }

        .kpi-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .kpi-card p {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        /* Database Table */
        .table-wrapper {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: left;
        }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        th {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.01);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        tr {
            transition: var(--transition-smooth);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .loading-text {
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 0;
        }

        /* Pulse identifier */
        .pulse-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-weight: 600;
        }
        .pulse-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-cyan);
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="dashboard-title-area">
            <div>
                <h1>Panel de Control Operativo</h1>
                <p style="color: var(--text-secondary); margin-top: 4px;">Monitoreo y administración comercial de Wiseflow</p>
            </div>
            <a href="index.html" class="btn btn-secondary">← Volver al Sitio</a>
        </div>

        <div class="kpis-row">
            <div class="kpi-card">
                <h3>Inversión Total</h3>
                <p>$1,450.00</p>
            </div>
            <div class="kpi-card">
                <h3>Costo por Lead (Promedio)</h3>
                <p>$3.20</p>
            </div>
            <div class="kpi-card">
                <h3>Citas Agendadas por IA</h3>
                <p>42</p>
            </div>
        </div>

        <div class="table-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
                <h2 class="table-title" style="margin: 0;">Captura de Leads</h2>
                <div class="pulse-indicator">Tiempo Real</div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th style="border-top-left-radius: 8px;">Nombre</th>
                        <th>Email</th>
                        <th style="border-top-right-radius: 8px;">Mensaje / Objetivo</th>
                    </tr>
                </thead>
                <tbody id="tabla-leads">
                    <tr>
                        <td colspan="3" class="loading-text">Cargando datos operativos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://bdqkhzeaqhisuauywrka.supabase.co/rest/v1";
        const SUPABASE_ANON_KEY = "sb_publishable_l5e061fWZYJI39t3LP5sFg_0qKXKWJU";

        async function cargarLeads() {
            try {
                const response = await fetch(`${SUPABASE_URL}/leads?select=*`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                const leads = await response.json();
                const tbody = document.getElementById('tabla-leads');
                tbody.innerHTML = '';

                if (!leads || leads.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="loading-text">Aún no hay registros en la base de datos.</td></tr>';
                    return;
                }

                // Invertimos el arreglo para mostrar los más nuevos primero
                leads.reverse().forEach(lead => {
                    // Safe strings
                    const name = esc(lead.nombre);
                    const email = esc(lead.email);
                    const msg = esc(lead.mensaje);

                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 500; color: var(--text-primary);">${name}</td>
                            <td style="color: var(--text-secondary);">${email}</td>
                            <td style="color: var(--text-secondary); max-width: 400px; word-wrap: break-word;">${msg}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error jalando datos:", error);
                document.getElementById('tabla-leads').innerHTML = '<tr><td colspan="3" class="loading-text" style="color: #ef4444;">Hubo un error al conectar con la base de datos.</td></tr>';
            }
        }

        // Helper helper to escape content to prevent XSS
        function esc(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        cargarLeads();
    </script>

</body>
</html>
